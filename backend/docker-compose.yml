# Fix #71: no version field (Docker Compose V2 ignores it)
services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    pull_policy: always
    ports:
      - "8000:8000"
    command: start --user root --pass root --bind 0.0.0.0:8000 file:/data/srdb.db
    volumes:
      - surreal_data:/data  # Fix #72: persistent volume
    healthcheck:
      test: ["CMD", "surreal", "isready", "--conn", "http://localhost:8000"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    ports:
      - "8001:8001"
    depends_on:
      surrealdb:
        condition: service_healthy
    environment:
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_NAMESPACE: riskterrain
      SURREAL_DATABASE: main
      SURREAL_USER: root
      SURREAL_PASS: root
      PORT: "8001"  # Fix #73: explicit, matches exposed port
    env_file:  # Fix #13: optional
      - path: .env
        required: false
    restart: unless-stopped

volumes:
  surreal_data:
